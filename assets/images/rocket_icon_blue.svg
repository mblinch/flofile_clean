<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for the rocket - Blue theme -->
    <linearGradient id="rocketBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rocketTip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flames" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2980b9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f4e79;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="window" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#87ceeb;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#4682b4;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="512" cy="512" r="480" fill="#1e3a8a" stroke="#1e40af" stroke-width="4"/>
  
  <!-- Rocket flames -->
  <ellipse cx="512" cy="720" rx="80" ry="120" fill="url(#flames)" opacity="0.9"/>
  <ellipse cx="480" cy="740" rx="25" ry="60" fill="#3498db" opacity="0.7"/>
  <ellipse cx="544" cy="740" rx="25" ry="60" fill="#3498db" opacity="0.7"/>
  
  <!-- Rocket body -->
  <rect x="412" y="280" width="200" height="320" rx="100" ry="100" fill="url(#rocketBody)"/>
  
  <!-- Rocket tip -->
  <ellipse cx="512" cy="240" rx="100" ry="120" fill="url(#rocketTip)"/>
  
  <!-- Rocket window -->
  <circle cx="512" cy="380" r="60" fill="url(#window)" stroke="#1e3a8a" stroke-width="4"/>
  
  <!-- Rocket fins -->
  <polygon points="412,520 380,580 412,580" fill="#1e3a8a"/>
  <polygon points="612,520 644,580 612,580" fill="#1e3a8a"/>
  
  <!-- Rocket details -->
  <rect x="450" y="450" width="124" height="8" rx="4" fill="#1e3a8a" opacity="0.3"/>
  <rect x="450" y="470" width="124" height="8" rx="4" fill="#1e3a8a" opacity="0.3"/>
  <rect x="450" y="490" width="124" height="8" rx="4" fill="#1e3a8a" opacity="0.3"/>
  
  <!-- Stars around rocket -->
  <polygon points="200,150 205,165 220,165 208,175 213,190 200,180 187,190 192,175 180,165 195,165" fill="#60a5fa" opacity="0.8"/>
  <polygon points="750,200 753,210 763,210 755,216 758,226 750,220 742,226 745,216 737,210 747,210" fill="#60a5fa" opacity="0.8"/>
  <polygon points="850,400 853,410 863,410 855,416 858,426 850,420 842,426 845,416 837,410 847,410" fill="#60a5fa" opacity="0.8"/>
  <polygon points="150,500 153,510 163,510 155,516 158,526 150,520 142,526 145,516 137,510 147,510" fill="#60a5fa" opacity="0.8"/>
</svg>
