<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rocketBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rocketTip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flames" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.5" />
    </linearGradient>
  </defs>
  <!-- Rocket flames -->
  <ellipse cx="512" cy="720" rx="80" ry="120" fill="url(#flames)"/>
  <ellipse cx="480" cy="740" rx="25" ry="60" fill="#ffffff" opacity="0.8"/>
  <ellipse cx="544" cy="740" rx="25" ry="60" fill="#ffffff" opacity="0.8"/>
  <!-- Rocket body -->
  <rect x="412" y="280" width="200" height="320" rx="100" ry="100" fill="url(#rocketBody)"/>
  <!-- Rocket tip -->
  <ellipse cx="512" cy="240" rx="100" ry="120" fill="url(#rocketTip)"/>
  <!-- Rocket window -->
  <circle cx="512" cy="380" r="60" fill="#ffffff" opacity="0.9" stroke="#ffffff" stroke-width="4"/>
  <!-- Rocket fins -->
  <polygon points="412,520 380,580 412,580" fill="url(#rocketBody)"/>
  <polygon points="612,520 644,580 612,580" fill="url(#rocketBody)"/>
  <!-- Rocket details -->
  <rect x="450" y="450" width="124" height="4" rx="2" fill="#ffffff" opacity="0.5"/>
  <rect x="450" y="470" width="124" height="4" rx="2" fill="#ffffff" opacity="0.5"/>
  <rect x="450" y="490" width="124" height="4" rx="2" fill="#ffffff" opacity="0.5"/>
</svg>
