# Nightly roster pull → Firestore (see scripts/nightly-roster-sync.mjs).
# Requires repo secret: FIREBASE_SERVICE_ACCOUNT_JSON (Firebase Admin SDK JSON).
#
# 6:00 AM US Eastern (EDT) = 10:00 UTC

name: Nightly roster sync

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install script dependencies
        working-directory: scripts
        run: npm ci

      - name: Run roster sync
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node nightly-roster-sync.mjs
