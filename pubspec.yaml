name: quick_cap
description: A Flutter app for generating Getty-style captions with IPTC metadata and code-replacement dropdowns.
publish_to: "none"
version: 1.0.11+111

environment:
  sdk: ">=2.18.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # File & directory picking - using native macOS implementation

  # For network requests
  http: ^1.2.1

  # Nicer, highly-customizable dropdowns
  dropdown_flutter: ^1.0.3

  # Internationalization & date formatting
  intl: ^0.18.1

# Path utilities
  path: ^1.8.3
  path_provider: ^2.1.2

  adaptive_navigation: ^0.0.6

  xml: ^6.3.0

  # Collection utilities
  collection: ^1.18.0

  # Image caching
  flutter_cache_manager: ^3.3.1

  image: ^4.1.3
  flutter_svg: ^2.0.10+1

  # High-performance image loading
  cached_network_image: ^3.3.1
  photo_view: ^0.14.0
  extended_image: ^10.0.1

  # FTP connectivity - using raw sockets for reliability

  # Local storage
  shared_preferences: ^2.2.2
  
  # File picker for importing camera serial numbers
  file_picker: ^8.0.0+1

  # Native-style settings/preferences UI (sectioned lists)
  flutter_settings_ui: ^3.0.1
  flutter_switch: ^0.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/rocket_icon_white_only.svg

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/rocket_icon_white_blue.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/rocket_icon_white_blue.png"
    background_color: "#1e3a8a"
    theme_color: "#4a90e2"
  windows:
    generate: true
    image_path: "assets/images/rocket_icon_white_blue.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/rocket_icon_white_blue.png"