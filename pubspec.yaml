name: quick_cap
description: A Flutter app for generating Getty-style captions with IPTC metadata and code-replacement dropdowns.
publish_to: "none"
version: 1.0.24+125

environment:
  sdk: ">=2.18.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # File & directory picking - using native macOS implementation

  # For network requests
  http: ^1.2.1

  # Nicer, highly-customizable dropdowns
  dropdown_flutter: ^1.0.3

  # Internationalization & date formatting
  intl: ^0.18.1

# Path utilities
  path: ^1.8.3
  path_provider: ^2.1.2

  adaptive_navigation: ^0.0.6

  xml: ^6.3.0

  # Collection utilities
  collection: ^1.18.0

  # Image caching
  flutter_cache_manager: ^3.3.1

  image: ^4.1.3
  flutter_svg: ^2.0.10+1

  # High-performance image loading
  cached_network_image: ^3.3.1
  photo_view: ^0.14.0
  extended_image: ^10.0.1

  # FTP connectivity - using raw sockets for reliability

  # Local storage
  shared_preferences: ^2.2.2

  # App version / build for update prompts
  package_info_plus: ^8.0.0
  
  # File picker for importing camera serial numbers
  file_picker: ^8.0.0+1

  # Native-style settings/preferences UI (sectioned lists)
  flutter_settings_ui: ^3.0.1
  flutter_switch: ^0.3.2
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  # Tighter, styled checkbox than Material (avoids huge default control + padding)
  custom_checkbox_plus: ^1.0.0
  timezone: ^0.10.1
  google_fonts: ^6.3.2
  firebase_auth: ^6.5.1
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/rocket_icon_white_only.svg

  fonts:
    - family: Manrope
      fonts:
        - asset: fonts/Manrope-Variable.ttf
    - family: SpaceGrotesk
      fonts:
        - asset: fonts/SpaceGrotesk-Variable.ttf
    - family: PlusJakartaSans
      fonts:
        - asset: fonts/PlusJakartaSans-Variable.ttf
    - family: DMSans
      fonts:
        - asset: fonts/DMSans-Variable.ttf
    - family: Outfit
      fonts:
        - asset: fonts/Outfit-Variable.ttf
    - family: Geist
      fonts:
        - asset: fonts/Geist-Variable.ttf
    - family: Inter
      fonts:
        - asset: fonts/Inter-Variable.ttf
          weight: 100
        - asset: fonts/Inter-Variable.ttf
          weight: 200
        - asset: fonts/Inter-Variable.ttf
          weight: 300
        - asset: fonts/Inter-Variable.ttf
          weight: 400
        - asset: fonts/Inter-Variable.ttf
          weight: 500
        - asset: fonts/Inter-Variable.ttf
          weight: 600
        - asset: fonts/Inter-Variable.ttf
          weight: 700
        - asset: fonts/Inter-Variable.ttf
          weight: 800
        - asset: fonts/Inter-Variable.ttf
          weight: 900
    - family: Lora
      fonts:
        - asset: fonts/Lora-Variable.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/rocket_icon_white_blue.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/rocket_icon_white_blue.png"
    background_color: "#1e3a8a"
    theme_color: "#4a90e2"
  windows:
    generate: true
    image_path: "assets/images/rocket_icon_white_blue.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/rocket_icon_white_blue.png"